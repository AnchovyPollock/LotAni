<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThorVG Lottie Player with Audio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Your styles here */
  </style>
</head>
<body>
  <div class="container">
    <h1>Sürüm 1.1</h1>
    <dotlottie-wc
      id="dotlottiePlayer"
      src="./gamersJourney.lottie"
      marker="Wizard"
      style="width: 630px; height: 420px;"
    ></dotlottie-wc>

    <div class="audio-controls">
      <i class="fas fa-play-circle play-icon" id="playAudio"></i>
      <audio id="audioPlayer" loop>
        <source src="./Twinkle Little Star.mp3" type="audio/mpeg">
      </audio>
    </div>
  </div>

  <!-- Load the Lottie player -->
  <script type="module" src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js"></script>
  
  <!-- Load your script -->
  <script src="./script.js"></script>
</body>
</html>
